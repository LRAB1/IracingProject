 version: "3"
 services:

  apache:
    build: .
    ports:
      - 80:80
    volumes:
      - ./src:/var/www/html/
    environment:
      - MYSQL_USER
      - MYSQL_PASSWORD
      - MYSQL_HOST

  db:
    image: mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: example

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080
    volumes:
      - ./db:/var/lib/mysql
  phpmyadmin:
    image: arm64v8/phpmyadmin
    environment:
      - PMA_HOST=mysql
    ports:
      - 81:80